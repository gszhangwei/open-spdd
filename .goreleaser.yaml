version: 2

project_name: openspdd

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/openspdd
    binary: openspdd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: openspdd
    repository:
      owner: gszhangwei
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/gszhangwei/open-spdd"
    description: "AI Coding Assistant Command Template Manager"
    license: "MIT"
    install: |
      bin.install "openspdd"
    test: |
      system "#{bin}/openspdd", "--version"
